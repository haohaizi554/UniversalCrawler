<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Crawler Pro</title>
<!--
  修复闪烁 BUG: 避免页面刷新时先渲染默认状态再被 WebSocket 配置覆盖
  策略:
  1. <head> 内联脚本在 HTML 解析阶段立刻从 localStorage 读取上次保存的主题/源/目录
  2. 直接设置 <html data-theme> 属性和初始变量，让首屏 CSS 直接渲染最终状态
  3. 主体内容默认隐藏 (body.loading)，直到 WebSocket config 消息到达后才显示
-->
<script>
(function() {
  try {
    // 主题: localStorage 缓存的深色/浅色状态
    var cachedTheme = localStorage.getItem('cached_dark_theme');
    if (cachedTheme !== null) {
      var isDark = cachedTheme === 'true';
      if (!isDark) {
        document.documentElement.setAttribute('data-theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', '');
      }
    }
    // 源: 缓存上次选择 (kuaishou/douyin/bilibili/missav)
    var cachedSource = localStorage.getItem('cached_last_source');
    if (cachedSource) {
      // 写入到 documentElement dataset，等待 init 时读取
      document.documentElement.dataset.cachedSource = cachedSource;
    }
    // 目录: 缓存上次保存路径
    var cachedDir = localStorage.getItem('cached_save_dir');
    if (cachedDir) {
      document.documentElement.dataset.cachedDir = cachedDir;
    }
  } catch(e) {
    // localStorage 不可用时静默降级
  }
})();
</script>
<style>
/* ===== VS Code Dark+ 配色 (与 themes.py 完全一致) ===== */
:root {
  --bg: #1e1e1e;
  --panel: #252526;
  --input: #3c3c3c;
  --accent: #0078d4;
  --accent-hover: #0062a3;
  --danger: #f14c4c;
  --danger-hover: #992222;
  --text: #cccccc;
  --input-text: #ffffff;
  --border: #3c3c3c;
  --btn-bg: #2d2d2d;
  --btn-hover: #3e3e3e;
  --btn-pressed: #222;
  --scrollbar-bg: #111;
  --scrollbar-handle: #888;
  --scrollbar-hover: #fff;
  --video-bg: #0a0a0a;
  --log-bg: #1a1a1a;
  --slider-track: #3c3c3c;
  --muted-text: #888;
  --alt-row: rgba(255,255,255,.03);
  --hover-row: rgba(255,255,255,.06);  /* 与 GUI QTableWidget::item:hover 一致 */
  --dir-border: #555;
  --dir-text: #aaa;
  --danger-disabled-text: #555;
}
[data-theme="light"] {
  --bg: #f3f3f3;
  --panel: #ffffff;
  --input: #ffffff;
  --accent: #0078d4;
  --accent-hover: #005a9e;
  --danger: #d13438;
  --danger-hover: #a12d32;
  --text: #3b3b3b;
  --input-text: #3b3b3b;
  --border: #e0e0e0;
  --btn-bg: #f0f0f0;
  --btn-hover: #e5e5e5;
  --btn-pressed: #d5d5d5;
  --scrollbar-bg: #e0e0e0;
  --scrollbar-handle: #c0c0c0;
  --scrollbar-hover: #666;
  --video-bg: #e8e8e8;
  --log-bg: #f0f0f0;
  --slider-track: #d5d5d5;
  --muted-text: #666;
  --alt-row: rgba(0,0,0,.03);
  --hover-row: rgba(0,0,0,.05);  /* 与 GUI QTableWidget::item:hover 一致 */
  --dir-border: #aaa;
  --dir-text: #666;
  --danger-disabled-text: #999;
}

* { margin:0; padding:0; box-sizing:border-box; }

/* ===== 修复闪烁 BUG: 初始隐藏主体，等 config 消息到达后由 JS 移除 .loading ===== */
body.loading { visibility:hidden; }
/* 加载占位遮罩 (仅在 loading 状态下可见) */
body.loading::before {
  content:"";
  position:fixed; inset:0;
  background: var(--bg);
  z-index: 999999;
  visibility: visible;
}
body.loading::after {
  content:"正在加载...";
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  color: var(--muted-text);
  font-size:14px;
  z-index: 999999;
  visibility: visible;
}
body {
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 10px;  /* 与 GUI setContentsMargins(10,10,10,10) 一致 */
  gap: 10px;  /* 与 GUI setSpacing(10) 一致：top_bar 和 main_layout 之间 10px */
}
::-webkit-scrollbar { width:12px; height:12px; }
::-webkit-scrollbar-track { background:var(--scrollbar-bg); }
::-webkit-scrollbar-thumb { background:var(--scrollbar-handle); border-radius:4px; min-height:20px; }
::-webkit-scrollbar-thumb:hover { background:var(--scrollbar-hover); }
::-webkit-scrollbar-button { display:none; }

/* ===== 顶部工具栏 (TopBar) ===== */
.top-bar {
  display:flex; align-items:center; gap:10px;
  padding:5px 10px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  height:50px;
  min-width:0;
}

/* ===== 下拉框 (与 GUI QComboBox 风格一致) ===== */
.source-select, .dynamic-area select {
  border:1px solid var(--border); border-radius:4px;
  background:var(--input); color:var(--input-text);
  font-size:13px; height:30px; padding:0 8px;
  /* 修复: 自定义下拉箭头（使用 background-image 模拟，避免浏览器原生外观） */
  background-image: linear-gradient(45deg, transparent 50%, var(--muted-text) 50%),
                    linear-gradient(135deg, var(--muted-text) 50%, transparent 50%);
  background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
  background-size: 5px 5px, 5px 5px;
  background-repeat: no-repeat;
  -webkit-appearance:none; -moz-appearance:none; appearance:none;
  padding-right:24px;  /* 给箭头留空间 */
  cursor:pointer; outline:none;
  width:auto; min-width:80px; max-width:200px;
}
.source-select:hover, .dynamic-area select:hover { border-color:var(--accent); }
.source-select:focus, .dynamic-area select:focus { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
.search-input {
  flex:1; padding:4px; border:1px solid var(--border); border-radius:4px;
  background:var(--input); color:var(--input-text);
  font-size:13px; height:30px; outline:none;
  min-width:180px;
}
.search-input:focus { border:1px solid var(--accent); }
.search-input::placeholder { color:var(--muted-text); }

/* 动态配置区 */
.dynamic-area {
  display:flex; align-items:center; gap:8px;
  flex-shrink:0;
}
.dynamic-area select {
  padding:2px 24px 2px 6px;  /* 给箭头留空间 */
  font-size:12px; height:26px;
  min-width:84px; max-width:84px;
  background-image: linear-gradient(45deg, transparent 50%, var(--muted-text) 50%),
                    linear-gradient(135deg, var(--muted-text) 50%, transparent 50%);
  background-position: calc(100% - 12px) 50%, calc(100% - 8px) 50%;
  background-size: 4px 4px, 4px 4px;
  background-repeat: no-repeat;
  -webkit-appearance:none; -moz-appearance:none; appearance:none;
}
.dynamic-area input[type="checkbox"] { border:1px solid var(--border); border-radius:4px; background:var(--input); color:var(--input-text); padding:2px 6px; font-size:12px; height:26px; }
.dynamic-area label { font-size:12px; color:var(--muted-text); white-space:nowrap; }
.dynamic-area input[type="checkbox"] { accent-color:var(--accent); width:14px; height:14px; }

/* 按钮通用 */
.btn {
  border:1px solid var(--border); border-radius:4px;
  background:var(--btn-bg); color:var(--text);
  padding:5px 15px; font-size:13px; cursor:pointer;
  height:30px; white-space:nowrap;
  transition:background .1s;
  flex-shrink:0;
}
.btn:hover { background:var(--btn-hover); }
.btn:active { background:var(--btn-pressed); }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn:focus-visible,
.op-btn:focus-visible,
.play-btn:focus-visible,
.fullscreen-btn:focus-visible,
.source-select:focus-visible,
.search-input:focus-visible,
.seek-slider:focus-visible,
.dir-item:focus-visible {
  outline:2px solid var(--accent);
  outline-offset:2px;
}
.btn-primary {
  background:var(--accent); border:none; color:#fff; font-weight:bold;
}
.btn-primary:hover { background:var(--accent-hover); }
.btn-primary:disabled { background:var(--btn-bg); color:var(--muted-text); border:1px solid var(--border); opacity:1; }
.btn-danger {
  background:var(--danger); border:none; color:#fff; font-weight:bold;
}
.btn-danger:hover { background:var(--danger-hover); }
.btn-danger:disabled { background:var(--btn-bg); color:var(--danger-disabled-text); border:1px solid var(--border); opacity:1; }
.btn-dir {
  background:var(--input); border:1px dashed var(--dir-border);
  color:var(--dir-text); text-align:left;
}
.btn-dir:hover { border:1px dashed var(--accent); color:var(--text); background:var(--btn-hover); }
.btn-theme {
  background:var(--accent); border:none; border-radius:15px;
  color:#fff; font-weight:bold; padding:5px 0; width:40px;
  text-align:center;
}
.btn-theme:hover { background:var(--accent-hover); }

/* ===== 主布局 ===== */
.main-layout {
  display:flex; flex:1; overflow:hidden;
}

/* ===== QSplitter 分割线 ===== */
/* 水平分割线 (左|右) */
.h-splitter {
  width:4px; cursor:col-resize; flex-shrink:0;
  background:var(--bg);
  position:relative;
}
.h-splitter:hover, .h-splitter.active { background:var(--accent); }
/* 垂直分割线 (预览|日志) */
.v-splitter {
  height:4px; cursor:row-resize; flex-shrink:0;
  background:var(--bg);
}
.v-splitter:hover, .v-splitter.active { background:var(--accent); }

/* ===== 左侧面板：下载队列 (ContentPanel) ===== */
.left-panel {
  width:400px; min-width:200px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:4px;
  display:flex; flex-direction:column;
  overflow:hidden;
  flex-shrink:0;
}
/* 队列标题栏 (HeaderBar) */
.queue-header {
  background:var(--input);
  border-bottom:1px solid var(--border);
  border-top-left-radius:4px; border-top-right-radius:4px;
  height:35px; display:flex; align-items:center;
  padding:0 10px; gap:0; flex-shrink:0;
}
.queue-header .title { font-size:13px; }
.queue-header .sep { color:#888; margin:0 4px; }
.queue-header .path-label-text { color:#888; }
.queue-header .path {
  color:var(--accent); font-family:'Consolas',monospace;
  font-weight:bold; padding-left:5px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  flex:1;
}

/* 表格 (与 QTableWidget 完全一致) */
.table-wrap {
  flex:1; overflow-y:scroll; overflow-x:hidden;
  border-bottom-left-radius:4px; border-bottom-right-radius:4px;  /* 配合 left-panel 圆角 */
}
.queue-table {
  width:100%; border-collapse:collapse; font-size:13px;
  table-layout:fixed; border:none; background-color:var(--panel);
}
/* 列宽: 标题列 Stretch，状态/进度/操作列固定宽度 (与 GUI setSectionResizeMode 一致) */
.col-title-col { width: auto; }
.queue-table th {
  background:var(--input); color:var(--text);
  padding:5px 5px; border:none; border-bottom:1px solid var(--border);
  font-weight:bold; text-align:left; position:sticky; top:0; z-index:1;
  height:28px;  /* 与 GUI QHeaderView 默认高度一致 */
  white-space:nowrap;
}
.queue-table th:nth-child(2),
.queue-table th:nth-child(3),
.queue-table th:nth-child(4) { text-align:center; }
.queue-table td {
  padding:0 5px; border-bottom:1px solid var(--border);
  height:36px; vertical-align:middle;  /* 与 GUI verticalHeader.setDefaultSectionSize(36) 一致 */
  border-left:none; border-right:none; border-top:none;
}
/* 交替行色 (setAlternatingRowColors) */
.queue-table tr:nth-child(even) { background:var(--alt-row); }
/* Hover 效果 (PyQt6 QTableWidget 默认有 hover, 见 GUI 截图第二行) */
.queue-table tbody tr:hover { background:var(--hover-row); }
.queue-table tr.selected { background:var(--accent) !important; }
.queue-table tr.selected:hover { background:var(--accent) !important; }
.queue-table tr.selected td { color:#fff !important; border-bottom-color:var(--accent) !important; }
.col-title { cursor:default; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.col-status { text-align:center; white-space:nowrap; font-size:12px; }
.col-progress { text-align:center; padding:0 5px; }
.col-actions { text-align:center; padding:2px 5px; white-space:nowrap; }

/* 标题双击编辑 (与 itemChanged 一致) */
.title-edit {
  background:var(--input); color:var(--input-text);
  border:1px solid var(--accent); border-radius:2px;
  padding:2px 4px; font-size:13px; width:100%;
  outline:none; font-family:inherit;
}

/* 进度条 (与 QProgressBar 完全一致: text-align:center; font-size:11px; border-radius:3px) */
.progress-wrap {
  border:1px solid var(--border); border-radius:3px;
  background:var(--input); text-align:center;
  font-size:11px; height:18px; position:relative; overflow:hidden;
  margin:8px 0;  /* 垂直居中: 单元格 36px - 进度条 18px = 18px, 上下各 9px */
}
.progress-fill {
  height:100%; background:var(--accent);
  transition:width .3s;
  border-radius:2px;
}
.progress-text {
  position:absolute; inset:0; display:flex;
  align-items:center; justify-content:center;
  font-size:11px; color:var(--text);
  text-shadow: 0 0 3px var(--panel), 0 0 3px var(--panel);
  z-index:1;  /* 文字在进度条之上 */
}
.queue-table tr.selected .progress-wrap { border-color:rgba(255,255,255,.3); }
.queue-table tr.selected .progress-text { color:#fff; text-shadow: 0 0 3px rgba(0,0,0,.5); }

/* 操作按钮 (与 GUI setIcon(SP_MediaPlay) / SP_TrashIcon 风格一致) */
.op-btn {
  border:1px solid var(--border); border-radius:4px;
  background:var(--btn-bg); color:var(--text);
  width:28px; height:26px; cursor:pointer;
  display:inline-flex; align-items:center; justify-content:center;
  font-size:13px; margin:0 4px;  /* 与 GUI operation_layout.setSpacing(8) 一致 (左右各 4) */
  line-height:1; padding:0;
}
.op-btn:hover { background:var(--btn-hover); }
.op-btn.del:hover { color:var(--danger); border-color:var(--danger); }
.queue-table tr.selected .op-btn { color:#fff; border-color:rgba(255,255,255,.3); background:rgba(255,255,255,.1); }
.queue-table tr.selected .op-btn.del:hover { color:#fff; background:var(--danger); border-color:var(--danger); }

/* ===== 右侧面板 ===== */
.right-panel {
  flex:1; display:flex; flex-direction:column;
  min-width:0;
  padding:0; margin:0;
}

/* ===== 媒体预览面板 (ContentPanel) ===== */
.preview-panel {
  flex:1; min-height:100px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:4px;
  display:flex; flex-direction:column;
  overflow:hidden;
}
.preview-area {
  flex:1; background:var(--video-bg);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  border-top-left-radius:4px; border-top-right-radius:4px;
}
.preview-area video, .preview-area img {
  max-width:100%; max-height:100%; object-fit:contain;
}
.preview-placeholder { color:#555; font-size:13px; }

/* 控制面板 (与 GUI ControlPanel 完全一致: setContentsMargins(15,0,15,0); setSpacing(15); height:50px) */
.control-panel {
  background:var(--panel);
  border-top:1px solid var(--border);
  height:50px; display:flex; align-items:center;
  padding:0 15px; gap:15px; flex-shrink:0;
}
.play-btn {
  width:32px; height:32px; border-radius:16px;
  background:var(--btn-bg); border:1px solid var(--border);
  color:var(--text); cursor:pointer; font-size:12px;
  display:flex; align-items:center; justify-content:center;
  line-height:1; flex-shrink:0; padding:0;
}
.play-btn:hover { background:var(--btn-hover); }
/* 保留 DOM/API 给键盘与回归测试使用；视觉上对齐 GUI，控制条只显示播放、进度、时间、全屏。 */
.nav-btn {
  width:32px; height:32px; border-radius:4px;
  background:var(--btn-bg); border:1px solid var(--border);
  color:var(--text); cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:background .15s;
  display:none;
}
.nav-btn:hover { background:var(--btn-hover); }
.nav-btn:active { background:var(--accent); color:#fff; }
.nav-btn:disabled { opacity:.4; cursor:not-allowed; }
/* 修复 BUG-142: 进度条丝滑拖动 (与 GUI QSlider.setTracking(True) 一致) */
.seek-slider {
  flex:1; min-width:0; height:6px; -webkit-appearance:none; appearance:none;
  background:linear-gradient(to right, var(--accent) 0%, var(--accent) 0%, var(--slider-track) 0%, var(--slider-track) 100%);
  border-radius:3px; outline:none; cursor:pointer;
  transition: background 0s;  /* 拖动时不延迟 */
}
.seek-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:14px; height:14px;
  border-radius:50%; background:var(--accent); cursor:grab;
  border:2px solid var(--panel); box-shadow:0 0 0 1px var(--accent);
  transition:transform .1s ease, box-shadow .1s ease;
}
.seek-slider::-webkit-slider-thumb:hover { transform:scale(1.15); box-shadow:0 0 0 2px var(--accent); }
.seek-slider::-webkit-slider-thumb:active { cursor:grabbing; transform:scale(1.25); box-shadow:0 0 0 3px var(--accent); }
.seek-slider::-moz-range-thumb {
  width:14px; height:14px; border-radius:50%; background:var(--accent);
  border:2px solid var(--panel); cursor:grab;
  box-shadow:0 0 0 1px var(--accent);
  transition:transform .1s ease, box-shadow .1s ease;
}
.seek-slider::-moz-range-thumb:hover { transform:scale(1.15); }
.seek-slider::-moz-range-thumb:active { cursor:grabbing; transform:scale(1.25); }
.time-label {
  color:var(--muted-text); font-family:'Consolas',monospace;
  font-size:12px; white-space:nowrap; flex-shrink:0; min-width:90px; text-align:center;
}
.fullscreen-btn {
  border-radius:4px; background:var(--btn-bg);
  border:1px solid var(--border); color:var(--text);
  font-size:12px; padding:0 10px; height:32px; cursor:pointer;
  flex-shrink:0; white-space:nowrap;
}

.fullscreen-btn:hover { background:var(--btn-hover); }

/* ===== 日志面板 (LogText) ===== */
.log-panel {
  height:200px; min-height:60px;
  background:var(--log-bg);
  border:1px solid var(--border);
  border-radius:4px;
  overflow-y:scroll;
  padding:4px 8px;
  font-family:'Consolas','Fira Code',monospace;
  font-size:12px; line-height:1.5;
  color:var(--text);
  /* 修复 BUG-188: 允许日志文本可选中复制（与 GUI QPlainTextEdit setReadOnly(True) 默认支持一致） */
  user-select:text;
  -webkit-user-select:text;
  cursor:text;
}
.log-entry { word-break:break-all; }

/* ===== 文件夹选择对话框 (服务端目录浏览器) ===== */
.dir-modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.5); z-index:99999;
  align-items:center; justify-content:center;
}
.dir-modal-overlay.active { display:flex; }
.dir-modal-box {
  background:var(--panel); border:1px solid var(--border);
  border-radius:4px; width:600px; height:500px;
  max-width:90vw; max-height:85vh;
  display:flex; flex-direction:column;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
}
.dir-modal-title {
  padding:15px 20px; font-size:14px; font-weight:bold;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.dir-modal-body {
  flex:1; display:flex; flex-direction:column;
  overflow:hidden; padding:10px 20px;
}
.dir-path-row {
  display:flex; gap:8px; margin-bottom:10px; flex-shrink:0;
}
.dir-path-row input {
  flex:1; padding:6px 10px; border:1px solid var(--border); border-radius:4px;
  background:var(--input); color:var(--input-text); font-size:13px; outline:none;
  font-family:'Consolas',monospace;
}
.dir-path-row input:focus { border-color:var(--accent); }
.dir-path-row .btn { flex-shrink:0; }
.dir-nav-row {
  display:flex; gap:6px; margin-bottom:8px; flex-shrink:0; align-items:center;
}
.dir-nav-row .btn { padding:4px 10px; font-size:12px; }
.dir-current-path {
  flex:1; font-family:'Consolas',monospace; font-size:12px;
  color:var(--accent); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.dir-list {
  flex:1; overflow-y:auto; border:1px solid var(--border);
  border-radius:4px; background:var(--bg);
}
.dir-list-loading {

<script>
// ---- State ----
// ======== 禁用浏览器原生右键菜单 (与 GUI 一致，桌面应用没有浏览器原生菜单) ========
document.addEventListener('contextmenu', (e) => {
  // 允许输入框和文本域的原生右键菜单（用于复制粘贴）
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  e.preventDefault();
});

let ws = null;
let videos = {};
let videoOrder = [];
let platforms = [];
let isCrawling = false;
// 修复闪烁 BUG: 优先从 localStorage 读取上次值，避免先用默认值再被 WebSocket 覆盖
let currentSource = (function() {
  try {
    var cached = localStorage.getItem('cached_last_source');
    if (cached) return cached;
  } catch(e) {}
  return 'kuaishou';
})();
let currentSaveDir = (function() {
  try {
    var cached = localStorage.getItem('cached_save_dir');
    if (cached) return cached;
  } catch(e) {}
  return 'downloads';
})();
let selectedVideoId = null;
let currentPlayingId = null;  // 独立于 selectedVideoId，记录当前正在播放的视频
// 修复闪烁 BUG: 主题也优先从 localStorage 读取
let isDarkTheme = (function() {
  try {
    var cached = localStorage.getItem('cached_dark_theme');
    if (cached !== null) return cached === 'true';
  } catch(e) {}
  return true;
})();
let recentDirs = [];
let isFullscreenMode = false;
// 主体首次渲染标志 (修复闪烁: 等 WebSocket config 消息到达后才显示)
let _initReady = false;
// 目录浏览器状态
let dirCurrentPath = '';
let dirParentPath = null;
let dirSelectedPath = null;

// ======== QSplitter 拖拽实现 ========
(function initSplitters() {
  // 水平分割线 (左面板 | 右面板)
  const hSplit = document.getElementById('hSplitter');
  const leftPanel = document.getElementById('leftPanel');
  let hDragging = false, hStartX = 0, hStartW = 0;

  // 恢复保存的 splitter 比例（与 GUI restoreState 一致）
  const savedLeftW = localStorage.getItem('splitter_left_width');
  if (savedLeftW) leftPanel.style.width = savedLeftW + 'px';

  hSplit.addEventListener('mousedown', (e) => {
    hDragging = true; hStartX = e.clientX; hStartW = leftPanel.offsetWidth;
    hSplit.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!hDragging) return;
    const dx = e.clientX - hStartX;
    const newW = Math.max(200, Math.min(hStartW + dx, window.innerWidth - 300));
    leftPanel.style.width = newW + 'px';
    resizePreviewImage();  // 与 GUI splitterMoved → scale_image_to_fit 一致
  });
  document.addEventListener('mouseup', () => {
    if (hDragging) {
      hDragging = false; hSplit.classList.remove('active'); document.body.style.cursor = ''; document.body.style.userSelect = '';
      localStorage.setItem('splitter_left_width', leftPanel.offsetWidth);  // 保存比例
    }
  });

  // 垂直分割线 (预览 | 日志)
  const vSplit = document.getElementById('vSplitter');
  const logPanel = document.getElementById('logPanel');
  let vDragging = false, vStartY = 0, vStartH = 0;

  // 恢复保存的日志面板高度
  const savedLogH = localStorage.getItem('splitter_log_height');
  if (savedLogH) logPanel.style.height = savedLogH + 'px';

  vSplit.addEventListener('mousedown', (e) => {
    vDragging = true; vStartY = e.clientY; vStartH = logPanel.offsetHeight;
    vSplit.classList.add('active');
    document.body.style.cursor = 'row-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!vDragging) return;
    // 向下拖 = 日志变小；向上拖 = 日志变大
    const dy = vStartY - e.clientY;
    const newH = Math.max(60, Math.min(vStartH + dy, window.innerHeight - 200));
    logPanel.style.height = newH + 'px';
    resizePreviewImage();  // 与 GUI splitterMoved → scale_image_to_fit 一致
  });
  document.addEventListener('mouseup', () => {
    if (vDragging) {
      vDragging = false; vSplit.classList.remove('active'); document.body.style.cursor = ''; document.body.style.userSelect = '';
      localStorage.setItem('splitter_log_height', logPanel.offsetHeight);  // 保存比例
    }
  });
})();

// ======== WebSocket ========
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => appendLog('🔗 WebSocket 已连接');
  ws.onclose = () => { setTimeout(connectWS, 3000); };
  ws.onerror = () => {};
  ws.onmessage = (e) => {
    try { handleServerMessage(JSON.parse(e.data)); } catch(err) { appendLog('⚠️ WebSocket 消息解析错误: ' + err.message); }
  };
}

function sendWS(type, data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({type, data}));
  } else {
    appendLog('⚠️ WebSocket 未连接，无法发送消息');
  }
}

function mergeVideoPayload(videoId, data) {
  const item = videos[videoId];
  if (!item || !data) return;
  if (data.title) item.title = data.title;
  if (data.local_path !== undefined) item.local_path = data.local_path || item.local_path || '';
  if (data.content_type !== undefined) item.content_type = data.content_type || item.content_type || '';
  if (data.meta && typeof data.meta === 'object') {
    item.meta = Object.assign({}, item.meta || {}, data.meta);
  }
}

// ======== Server Message Handler ========
function handleServerMessage(msg) {
  const {type, data} = msg;
  // 调试: 记录关键事件类型（帮助排查 BUG-180 等消息丢失问题）
  if (['clear_videos','item_found','scan_result','crawl_state','select_tasks'].includes(type)) {
    console.log(`[WS] 收到事件: ${type}`, data);
  }
  switch(type) {
    case 'init_state':
      // 不渲染旧 videos，因为 scan_local_dir 会立即推送 clear_videos + 新 item_found
      // 如果渲染旧数据会导致闪烁（先显示旧数据 → 清空 → 显示新数据）
      if (data.current_save_dir) {
        currentSaveDir = data.current_save_dir;
        document.getElementById('pathLabel').textContent = currentSaveDir;
        document.getElementById('pathLabel').title = currentSaveDir;
      }
      if (data.is_crawling) setCrawlState(true);
      break;
    case 'platforms':
      platforms = data;
      renderPlatformSelect();
      renderDynamicArea();
      // 修复闪烁 BUG: platforms 到达时也尝试解锁（config 可能比 platforms 先到）
      if (_initReady) _unlockBody();
      break;
    case 'config':
      applyConfig(data);
      if (data.common && data.common.last_source) {
        currentSource = data.common.last_source;
        const sel = document.getElementById('sourceSelect');
        if (sel) sel.value = currentSource;
        // 同步更新搜索框 placeholder（与 renderPlatformSelect 中 onchange 逻辑一致）
        const p = platforms.find(x => x.id === currentSource);
        document.getElementById('searchInput').placeholder = p ? p.search_placeholder : '输入关键词...';
        renderDynamicArea();
      }
      // 修复闪烁 BUG: 第一次收到 config 消息时移除 .loading 类，显示主体
      // 后续收到时只更新缓存（如果用户在另一标签页改了配置）
      if (!_initReady) {
        _initReady = true;
        _unlockBody();
      }
      // 同步 localStorage 缓存（确保跨标签页/刷新也保持一致）
      _syncLocalCache();
      break;
    case 'log':
      appendLog(data.message);
      break;
    case 'item_found':
      // 去重: 如果 REST API 已经添加了该 item，跳过 WebSocket 重复推送
      if (videos[data.id]) break;
      videos[data.id] = data;
      videoOrder.push(data.id);
      appendRow(data.id);  // 增量追加，与 GUI add_video_row 一致
      break;
    case 'video_state_changed':
      if (videos[data.video_id]) {
        if (data.status != null) videos[data.video_id].status = data.status;
        if (data.progress != null) videos[data.video_id].progress = data.progress;
        mergeVideoPayload(data.video_id, data);
        scheduleRowUpdate(data.video_id);  // 批量合并高频更新，避免 Web 端列表掉帧
      }
      break;
    case 'video_renamed':
      if (videos[data.video_id]) {
        if (data.new_title) videos[data.video_id].title = data.new_title;
        if (data.new_path) videos[data.video_id].local_path = data.new_path;
        scheduleRowUpdate(data.video_id);  // 增量更新单行
        appendLog(`📝 重命名确认: ${data.new_title || data.video_id}`);
      }
      break;
    case 'video_removed':
      if (currentPlayingId === data.video_id) closePreview();
      delete videos[data.video_id];
      videoOrder = videoOrder.filter(id => id !== data.video_id);
      if (selectedVideoId === data.video_id) selectedVideoId = null;
      removeRow(data.video_id);  // 增量删除单行，与 GUI remove_video_row 一致
      break;
    case 'clear_videos':
      if (currentPlayingId) closePreview();
      videos = {}; videoOrder = [];
      selectedVideoId = null;
      currentPlayingId = null;
      if (data && data.directory) {
        currentSaveDir = data.directory;
        document.getElementById('pathLabel').textContent = currentSaveDir;
        document.getElementById('pathLabel').title = currentSaveDir;
      }
      document.getElementById('queueBody').innerHTML = '';  // 清空表格
      updateNavBtnsState();
      break;
    case 'task_started':
      if (videos[data.video_id]) {
        videos[data.video_id].status = '⏳ 下载中...';
        videos[data.video_id].progress = 0;
        // 修复 BUG-139: 同步 local_path 让 Web 端能立即播放正在下载的视频
        mergeVideoPayload(data.video_id, data);
        scheduleRowUpdate(data.video_id);
      }
      break;
    case 'task_progress':
      if (videos[data.video_id]) { videos[data.video_id].progress = data.progress; scheduleRowUpdate(data.video_id); }
      break;
    case 'task_finished':
      if (videos[data.video_id]) {
        videos[data.video_id].status = '✅ 完成';
        videos[data.video_id].progress = 100;
        // 与 GUI _on_download_finished 一致：同步 local_path
        mergeVideoPayload(data.video_id, data);
        scheduleRowUpdate(data.video_id);
      }
      break;
    case 'task_error':
      if (videos[data.video_id]) {
        videos[data.video_id].status = '❌ 失败';
        mergeVideoPayload(data.video_id, data);
        // 与 GUI _on_download_error 一致：显示错误原因
        if (data.error) {
          appendLog(`❌ 下载失败 [${videos[data.video_id].title}]: ${data.error}`);
        }
        scheduleRowUpdate(data.video_id);
      }
      break;
    case 'crawl_state':
      setCrawlState(data.is_running);
      break;
    case 'select_tasks':
      if (data.timing) {
        const nowWall = Date.now();
        const relayLag = data.timing.controller_relay_perf_ms && data.timing.spider_emit_perf_ms
          ? (data.timing.controller_relay_perf_ms - data.timing.spider_emit_perf_ms).toFixed(1)
          : null;
        const browserLag = data.timing.controller_relay_wall_ms
          ? (nowWall - data.timing.controller_relay_wall_ms).toFixed(1)
          : null;
        console.log('[WS] select_tasks timing', {
          itemCount: Array.isArray(data.items) ? data.items.length : 0,
          relayLagMs: relayLag,
          browserLagMs: browserLag,
          timing: data.timing,
        });
      }
      showSelectionModal(data.items);
      break;
    case 'scan_result':
      break;
  }
}

// ======== Platform Select & Dynamic Area ========
function renderPlatformSelect() {
  const sel = document.getElementById('sourceSelect');
  sel.innerHTML = '';
  platforms.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id; opt.textContent = p.name;
    sel.appendChild(opt);
  });
  sel.value = currentSource;
  sel.onchange = () => {
    currentSource = sel.value;
    const p = platforms.find(x => x.id === currentSource);
    document.getElementById('searchInput').placeholder = p ? p.search_placeholder : '输入关键词...';
    renderDynamicArea();
    // 修复闪烁 BUG: 切换源时立即同步到 localStorage
    _cacheSource(currentSource);
    // #27: Source change saves to config via WebSocket
    sendWS('change_source', { source: currentSource });
  };
  const p = platforms.find(x => x.id === currentSource);
  if (p) document.getElementById('searchInput').placeholder = p.search_placeholder;
}

function renderDynamicArea() {
  const area = document.getElementById('dynamicArea');
  let html = '';
  if (currentSource === 'douyin') {

function getRunConfig() {
  const config = {};
  if (currentSource === 'douyin') {
    const el = document.getElementById('cfg_max_items');
    config.max_items = el ? parseInt(el.value) : 20;
    config.timeout = 10;  // 与 GUI read_douyin_run_options 一致
    sendWS('save_config', { section: 'douyin', key: 'max_items', value: config.max_items });
  } else if (currentSource === 'xiaohongshu') {
    const el = document.getElementById('cfg_max_items');
    config.max_items = el ? parseInt(el.value) : 20;
    config.search_max_pages = 5;
    sendWS('save_config', { section: 'xiaohongshu', key: 'max_items', value: config.max_items });
  } else if (currentSource === 'kuaishou') {
    const el = document.getElementById('cfg_max_items');
    config.max_items = el ? parseInt(el.value) : 20;
    sendWS('save_config', { section: 'kuaishou', key: 'max_items', value: config.max_items });
  } else if (currentSource === 'bilibili') {
    const el = document.getElementById('cfg_max_pages');
    config.max_pages = el ? parseInt(el.value) : 1;
    sendWS('save_config', { section: 'bilibili', key: 'max_pages', value: config.max_pages });
  } else if (currentSource === 'missav') {
    const indEl = document.getElementById('cfg_individual');
    const priEl = document.getElementById('cfg_priority');
    const proxyTypeEl = document.getElementById('cfg_proxy_type');
    const proxyPortEl = document.getElementById('cfg_proxy_port');
    config.individual_only = indEl ? indEl.checked : false;
    config.priority = priEl ? priEl.value : '中文字幕优先';
    const proxyType = proxyTypeEl ? proxyTypeEl.value : 'clash';
    const proxyPort = proxyPortEl ? parseInt(proxyPortEl.value) || 7890 : 7890;
    config.proxy = buildProxyUrl(proxyType, proxyPort);
    // 与 GUI read_missav_run_options 中 cfg.set / cfg.update_missav_proxy 一致
    sendWS('save_config', { section: 'missav', key: 'individual_only', value: config.individual_only });
    sendWS('save_config', { section: 'missav', key: 'priority', value: config.priority });
    sendWS('save_config', { section: 'missav', key: 'proxy_type', value: proxyType });
    sendWS('save_config', { section: 'missav', key: 'proxy_port', value: proxyPort });
    sendWS('save_config', { section: 'missav', key: 'proxy_url', value: config.proxy });
  }
  return config;
}

function buildProxyUrl(type, port) {
  // 后端构造完整代理URL，前端只传类型和端口号
  if (type === 'clash') return 'http://127.0.0.1:' + (port || 7890);
  if (type === 'v2ray') return 'http://127.0.0.1:' + (port || 10809);
  if (type === 'custom') return 'http://127.0.0.1:' + (port || 7890);
  return 'http://127.0.0.1:' + (port || 7890);
}

function onProxyTypeChange(sel) {
  // 切换代理类型时自动设置默认端口
  const portEl = document.getElementById('cfg_proxy_port');
  if (!portEl) return;
  if (sel.value === 'clash') portEl.value = '7890';
  else if (sel.value === 'v2ray') portEl.value = '10809';
}

function applyConfig(data) {
  if (data.common && data.common.save_directory) {

// 保存配置数据，在 renderDynamicArea 后恢复
let _pendingConfig = null;

function restorePluginConfig() {
  if (!_pendingConfig) return;
  const data = _pendingConfig;
  _pendingConfig = null;
  // 恢复动态配置区的选中值
  if (currentSource === 'douyin') {
    const saved = data.douyin && data.douyin.max_items;
    if (saved) { const el = document.getElementById('cfg_max_items'); if (el) el.value = saved; }
  } else if (currentSource === 'xiaohongshu') {

    if (saved) { const el = document.getElementById('cfg_max_items'); if (el) el.value = saved; }
  } else if (currentSource === 'bilibili') {
    const saved = data.bilibili && data.bilibili.max_pages;
    if (saved) { const el = document.getElementById('cfg_max_pages'); if (el) el.value = saved; }
  } else if (currentSource === 'kuaishou') {
    const saved = data.kuaishou && data.kuaishou.max_items;
    if (saved) { const el = document.getElementById('cfg_max_items'); if (el) el.value = saved; }
  } else if (currentSource === 'missav') {
    if (data.missav) {
      const indEl = document.getElementById('cfg_individual');
      if (indEl && data.missav.individual_only !== undefined) indEl.checked = !!data.missav.individual_only;
      const priEl = document.getElementById('cfg_priority');
      if (priEl && data.missav.priority) priEl.value = data.missav.priority;
      const proxyTypeEl = document.getElementById('cfg_proxy_type');
      if (proxyTypeEl && data.missav.proxy_type) proxyTypeEl.value = data.missav.proxy_type;
      const proxyPortEl = document.getElementById('cfg_proxy_port');
      if (proxyPortEl && data.missav.proxy_port !== undefined) proxyPortEl.value = data.missav.proxy_port;
    }
  }
}

// ======== Crawl Control ========
function startCrawl() {
  // 与 GUI on_btn_start_clicked 一致: 先检查 plugin 有效性
  if (!currentSource) {
    appendLog('❌ 未选择有效模式');
    return;
  }
  const keyword = document.getElementById('searchInput').value.trim();
  if (!keyword) { appendLog('⚠️ 请输入搜索内容！'); return; }
  // 与 GUI 一致：先发送信号，再设置 UI 状态
  // 如果服务端拒绝（如已有任务运行），会推送 crawl_state: {is_running: false} 恢复 UI
  try {
    const config = getRunConfig();
    sendWS('start_crawl', { source: currentSource, keyword, config });
    setCrawlState(true);
  } catch (e) {
    appendLog('❌ 启动任务失败: ' + e.message);
    setCrawlState(false);
  }
}

function stopCrawl() {
  sendWS('stop_crawl', {});
}

function setCrawlState(running) {
  isCrawling = running;
  document.getElementById('startBtn').disabled = running;
  document.getElementById('stopBtn').disabled = !running;
  document.getElementById('searchInput').disabled = running;
  document.getElementById('sourceSelect').disabled = running;
  document.querySelectorAll('#dynamicArea select, #dynamicArea input').forEach(el => el.disabled = running);
}

// ======== 文件夹选择对话框 (服务端目录浏览器) ========
// 与 GUI QFileDialog 对等的交互:
// - 单击文件夹 → 选中（高亮）
// - 双击文件夹 → 进入该文件夹
// - "选择此目录" → 确认当前目录
// - 记忆上次浏览位置（localStorage）
// - 驱动器列表快速跳转

function showDirDialog() {
  const modal = document.getElementById('dirModal');
  modal.style.display = 'flex';
  // 记忆: 优先用上次浏览位置，否则用 currentSaveDir
  const lastBrowsedDir = localStorage.getItem('dir_last_browsed') || currentSaveDir;
  dirLoadPath(lastBrowsedDir);
}

function dirLoadPath(path) {
  const listEl = document.getElementById('dirList');
  listEl.innerHTML = '<div class="dir-list-loading">加载中...</div>';
  document.getElementById('dirCurrentPath').textContent = path || '';

  fetch('/api/dir/list?path=' + encodeURIComponent(path))
    .then(res => {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(data => {
      dirCurrentPath = data.current || path;
      dirParentPath = data.parent || null;
      document.getElementById('dirInput').value = dirCurrentPath;
      document.getElementById('dirCurrentPath').textContent = dirCurrentPath;
      // 记忆浏览位置
      localStorage.setItem('dir_last_browsed', dirCurrentPath);

      let html = '';
      if (data.subdirs && data.subdirs.length > 0) {
        data.subdirs.forEach(d => {
          html += `<div class="dir-item" data-path="${escAttr(d.path)}" onclick="dirSelectItem(this,'${escAttr(d.path)}')" ondblclick="dirLoadPath('${escAttr(d.path)}')">
            <span class="dir-item-icon">📁</span>
            <span class="dir-item-name">${esc(d.name)}</span>
          </div>`;
        });
      } else {
        html = '<div class="dir-list-loading" style="color:var(--muted-text)">（无子目录）</div>';
      }
      listEl.innerHTML = html;
      dirSelectedPath = null;

      // 渲染驱动器
      const drivesEl = document.getElementById('dirDrivesList');
      const drivesSection = document.getElementById('dirDrivesSection');
      if (data.drives && data.drives.length > 0) {
        drivesSection.style.display = '';
        drivesEl.innerHTML = data.drives.map(d =>
          `<button class="dir-drive-btn" onclick="dirLoadPath('${escAttr(d.path)}')">${esc(d.name)}</button>`
        ).join('');
      } else {
        drivesSection.style.display = 'none';
      }
    })
    .catch(err => {
      listEl.innerHTML = `<div class="dir-list-error">加载失败: ${esc(err.message)}</div>`;
    });
}

function dirGoUp() {
  if (dirParentPath) {
    dirLoadPath(dirParentPath);
  }
}

function dirSelectItem(el, path) {
  document.querySelectorAll('.dir-item.selected').forEach(item => item.classList.remove('selected'));
  el.classList.add('selected');
  dirSelectedPath = path;
  document.getElementById('dirInput').value = path;
}

function dirRefresh() {
  dirLoadPath(dirCurrentPath);
}

function dirBrowsePath() {
  const path = document.getElementById('dirInput').value.trim();
  if (path) dirLoadPath(path);
}

function pickNativeDir() {
  appendLog('📂 正在打开系统目录选择器...');
  fetch('/api/dir/pick-native', { method: 'POST' })
    .then(res => {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(data => {
      if (data.error) {
        appendLog('⚠️ 系统目录选择器不可用: ' + data.error);
        return;
      }
      if (!data.path) {
        appendLog('ℹ️ 未选择目录，可继续使用目录浏览器');
        return;
      }
      dirSelectedPath = data.path;
      document.getElementById('dirInput').value = data.path;
      appendLog(`📂 已选择目录: ${data.path}`);
      dirLoadPath(data.path);
    })
    .catch(err => {
      appendLog('⚠️ 系统目录选择器不可用，已保留目录浏览器: ' + err.message);
    });
}

function confirmDirDialog() {
  // 与 GUI QFileDialog 一致: "选择此目录" = 确认当前浏览的目录
  const dir = dirSelectedPath || document.getElementById('dirInput').value.trim();
  if (!dir) return;
  // 先更新 UI 显示（与 GUI on_dir_changed 立即更新路径标签一致）
  currentSaveDir = dir;
  document.getElementById('pathLabel').textContent = currentSaveDir;
  document.getElementById('pathLabel').title = currentSaveDir;
  // 修复闪烁 BUG: 切换目录时立即同步到 localStorage
  _cacheDir(currentSaveDir);
  document.getElementById('dirModal').style.display = 'none';
  appendLog(`📂 正在切换目录: ${currentSaveDir}`);
  // 修复 BUG-182/184: 使用 REST API，后端返回扫描结果，前端直接更新 UI
  fetch('/api/dir/change', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({directory: currentSaveDir})
  }).then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }).then(data => {
    if (data.status === 'error') {
      appendLog('❌ 切换目录失败: ' + (data.error || '未知错误'));
      return;
    }
    // 修复 BUG-187: 切换目录前先停止旧视频，避免旧视频短暂继续播放
    // （与 GUI on_delete_video 先 stop_media_playback 一致：清理旧资源后再加载新资源）
    if (currentPlayingId) closePreview();
    // 根据后端返回的扫描结果直接更新前端状态（与 GUI on_dir_changed → scan_local_dir → add_video_row 一致）
    // 1. 清空旧数据
    videos = {};
    videoOrder = [];
    selectedVideoId = null;
    currentPlayingId = null;
    document.getElementById('queueBody').innerHTML = '';
    // 2. 更新目录
    if (data.directory) {
      currentSaveDir = data.directory;
      document.getElementById('pathLabel').textContent = currentSaveDir;
      document.getElementById('pathLabel').title = currentSaveDir;
    }
    // 3. 逐条添加扫描到的文件（与 GUI add_video_row 一致）
    if (data.items && data.items.length > 0) {
      data.items.forEach(item => {
        videos[item.id] = item;
        videoOrder.push(item.id);
        appendRow(item.id);
      });
    }
    // 4. 更新导航按钮状态
    updateNavBtnsState();
    appendLog(`📂 目录已变更: ${currentSaveDir}`);
    appendLog(`✅ ${data.message || '已加载 ' + (data.total_count || 0) + ' 个文件'}`);
  }).catch(err => {
    appendLog('❌ 切换目录请求失败: ' + err.message);
    // 回退方案: 通过 WebSocket 发送 change_dir 消息
    appendLog('⚠️ 尝试通过 WebSocket 切换目录...');
    sendWS('change_dir', { directory: currentSaveDir });
  });
}

function cancelDirDialog() {
  document.getElementById('dirModal').style.display = 'none';
}

function copyTraceId() {

// ======== 主图切换 (上一项 / 下一项 预览) ========
// 修复 v14: 把"🧪 测试弹窗"按钮换成"主图切换"按钮
// GUI 端没有显式按钮，但 ApplicationController.play_video() 内部会按文件类型
// 切换 show_image / play_video；Web 端已经做了图片/视频自动切换
// 这里的"主图切换"是增强：提供 ⏮/⏭ 按钮循环切换 videoOrder 里的资源
function switchPreview(direction) {
  if (videoOrder.length === 0) {
    appendLog('⚠️ 队列为空，没有可切换的资源');
    return;
  }
  const currentIdx = currentPlayingId
    ? videoOrder.indexOf(currentPlayingId)
    : -1;
  let nextIdx;
  if (currentIdx === -1) {
    // 没在预览任何资源，切换到第一个
    nextIdx = direction > 0 ? 0 : videoOrder.length - 1;
  } else {
    nextIdx = (currentIdx + direction + videoOrder.length) % videoOrder.length;
  }
  const nextId = videoOrder[nextIdx];
  const nextTitle = videos[nextId] ? videos[nextId].title : '未知';
  appendLog(`⏯ 主图切换: ${direction > 0 ? '下一项' : '上一项'} → ${nextTitle}`);
  previewVideo(nextId);
}

// ======== Queue Rendering (增量更新，与 GUI update_video_status 只更新单行一致) ========
function renderQueue() {
  const tbody = document.getElementById('queueBody');
  if (videoOrder.length === 0) { tbody.innerHTML = ''; updateNavBtnsState(); return; }
  tbody.innerHTML = videoOrder.map((id, idx) => buildRowHTML(id)).join('');
  updateNavBtnsState();
}

function buildRowHTML(id) {
  const v = videos[id];
  if (!v) return '';
  const progress = v.progress || 0;
  const isSelected = selectedVideoId === id;
  const rowClass = isSelected ? 'selected' : '';
  return `<tr class="${rowClass}" data-vid="${id}" onclick="selectVideo('${id}')" style="cursor:pointer">
    <td class="col-title" title="${esc(v.title)}" ondblclick="event.stopPropagation();startRename('${id}',this)">${esc(v.title)}</td>
    <td class="col-status">${esc(v.status || '')}</td>
    <td class="col-progress">
      <div class="progress-wrap">
        <div class="progress-fill" style="width:${progress}%"></div>
        <span class="progress-text">${progress}%</span>
      </div>
    </td>
    <td class="col-actions">
      <button class="op-btn play" onclick="event.stopPropagation();previewVideo('${id}')" title="播放">▶</button>
      <button class="op-btn del" onclick="event.stopPropagation();deleteVideo('${id}')" title="删除">🗑</button>
    </td>
  </tr>`;
}

// 增量更新单行（与 GUI update_video_status 只更新单行一致，避免大列表卡顿）
function updateRow(id) {
  const row = document.querySelector(`tr[data-vid="${id}"]`);
  if (!row) return;
  const v = videos[id];
  if (!v) return;
  const progress = v.progress || 0;
  const isSelected = selectedVideoId === id;
  row.className = isSelected ? 'selected' : '';
  // 更新标题和 tooltip（与 GUI item.setToolTip(new_title) 一致）
  const titleTd = row.querySelector('.col-title');
  if (titleTd) {
    titleTd.textContent = v.title || '';
    titleTd.title = v.title || '';
  }
  row.querySelector('.col-status').textContent = v.status || '';
  const fill = row.querySelector('.progress-fill');
  if (fill) fill.style.width = progress + '%';
  const ptext = row.querySelector('.progress-text');
  if (ptext) ptext.textContent = progress + '%';
}

const pendingRowUpdates = new Set();
let rowUpdateScheduled = false;

function scheduleRowUpdate(id) {
  if (!id) return;
  pendingRowUpdates.add(id);
  if (rowUpdateScheduled) return;
  rowUpdateScheduled = true;
  requestAnimationFrame(() => {
    rowUpdateScheduled = false;
    const ids = Array.from(pendingRowUpdates);
    pendingRowUpdates.clear();
    ids.forEach(updateRow);
  });
}

// 增量追加一行（与 GUI add_video_row 逐条添加一致）
function appendRow(id) {
  const tbody = document.getElementById('queueBody');
  tbody.insertAdjacentHTML('beforeend', buildRowHTML(id));
}

// 增量删除一行（与 GUI remove_video_row 一致）
function removeRow(id) {
  const row = document.querySelector(`tr[data-vid="${id}"]`);
  if (row) row.remove();
}

// 更新选中行高亮（只更新旧选中行和新选中行，不重建整个表格）
function updateSelection(oldId, newId) {
  if (oldId) {
    const oldRow = document.querySelector(`tr[data-vid="${oldId}"]`);
    if (oldRow) oldRow.classList.remove('selected');
  }
  if (newId) {
    const newRow = document.querySelector(`tr[data-vid="${newId}"]`);
    if (newRow) newRow.classList.add('selected');
  }
}

function selectVideo(id) {
  const oldId = selectedVideoId;
  selectedVideoId = id;
  updateSelection(oldId, id);
}

// ======== 标题双击重命名 (与 itemChanged 一致) ========
function startRename(id, td) {
  const v = videos[id];
  if (!v) return;
  // 与 GUI 一致：双击标题编辑时，行保持选中状态
  selectVideo(id);
  const input = document.createElement('input');
  input.className = 'title-edit';
  input.value = v.title;
  td.textContent = '';
  td.appendChild(input);
  input.focus();
  input.select();

  const finish = () => {
    const newTitle = input.value.trim();
    if (newTitle && newTitle !== v.title) {
      // 不立即改本地状态，等服务端 video_renamed 事件确认
      sendWS('rename_video', { video_id: id, new_title: newTitle });
    }
    // 恢复原始标题显示（等服务端确认后才更新）
    td.textContent = v.title;
    td.title = v.title;
  };

  input.addEventListener('blur', finish);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = v.title; input.blur(); }
  });
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) {
  if (!s) return '';
  return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');
}

// ======== Video Actions ========
// 图片缩放（与 GUI scale_image_to_fit / resize_media 一致）
function resizePreviewImage() {
  const img = document.querySelector('#previewArea img');
  if (!img) return;
  // CSS max-width/max-height + object-fit:contain 已自动处理缩放
  // 但需要触发重排以确保图片适应新容器尺寸
  const area = document.getElementById('previewArea');
  if (area) {
    img.style.maxWidth = area.clientWidth + 'px';
    img.style.maxHeight = area.clientHeight + 'px';
  }
}

// 窗口 resize 时触发图片缩放（与 GUI resizeEvent → resize_media 一致）
window.addEventListener('resize', () => {
  resizePreviewImage();
});

function closePreview() {
  // 修复 BUG-148: 显式停止视频元素（虽然 innerHTML 替换会触发停止，但更安全）
  const oldPlayer = document.getElementById('videoPlayer');
  if (oldPlayer) {
    try { oldPlayer.pause(); oldPlayer.removeAttribute('src'); oldPlayer.load(); } catch(e) {}
  }
  const area = document.getElementById('previewArea');
  area.innerHTML = '<div class="preview-placeholder">选择视频进行预览</div>';
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('seekSlider').value = 0;
  document.getElementById('seekSlider').max = 0;
  document.getElementById('timeLabel').textContent = '00:00';  // 与 GUI lbl_time 初始值 "00:00" 一致
  currentPlayingId = null;  // 与 GUI stop_playback() + current_playing_id = None 一致
  // 修复 v14: 主图切换按钮禁用状态
  updateNavBtnsState();
}

function updateNavBtnsState() {
  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');
  if (!prev || !next) return;
  const empty = videoOrder.length === 0;
  prev.disabled = empty;
  next.disabled = empty;
}

function deleteVideo(id) {
  // 与 GUI on_delete_video 一致：如果正在播放该视频，先停止
  if (currentPlayingId === id) {
    closePreview();
  }
  // 不在这里清除 selectedVideoId，等服务端 video_removed 事件确认后再清除
  // 这样如果删除失败，行仍然保持选中状态（与 GUI 一致）
  sendWS('delete_video', { video_id: id });
}

function previewVideo(id) {
  const v = videos[id];
  if (!v) return;
  // 修复 BUG-141: 切换视频前先暂停旧视频，与 GUI player.setSource 一致
  const oldPlayer = document.getElementById('videoPlayer');
  if (oldPlayer) {
    try { oldPlayer.pause(); } catch(e) {}
  }
  if (!v.local_path) {
    // 修复 BUG-139: local_path 为空可能是下载刚开始（task_started 还没到）
    // 多次重试: 500ms, 1000ms, 2000ms, 4000ms, 8000ms
    appendLog('⏳ 视频准备中，请稍候...');
    previewWithRetry(id, 0);
    return;
  }
  doPreview(id, v, oldPlayer);
}

// 多次重试包装器（修复 BUG-139）
function previewWithRetry(id, attempt) {
  const delays = [500, 1000, 2000, 4000, 8000];
  const v = videos[id];
  if (v && v.local_path) {
    doPreview(id, v, null);
  } else if (attempt < delays.length) {
    setTimeout(() => previewWithRetry(id, attempt + 1), delays[attempt]);
  } else {
    appendLog('❌ 视频还未开始下载，请稍后再试');
  }
}

function doPreview(id, v, oldPlayer) {
  // 选中行高亮
  const oldId = selectedVideoId;
  selectedVideoId = id;
  currentPlayingId = id;  // 与 GUI controller.current_playing_id = vid 一致
  updateSelection(oldId, id);
  const area = document.getElementById('previewArea');
  const ext = (v.local_path || '').split('.').pop().toLowerCase();
  const imgExts = ['jpg','jpeg','png','gif','webp','bmp'];
  if (imgExts.includes(ext)) {
    area.innerHTML = `<img src="/api/media/${id}" alt="${esc(v.title)}" style="max-width:100%;max-height:100%;object-fit:contain" onerror="appendLog('❌ 文件不存在或已被删除');closePreview()" />`;
    // 与 GUI show_image → player.stop() 一致：停止播放器，重置控制面板
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('seekSlider').value = 0;
    document.getElementById('seekSlider').max = 0;
    document.getElementById('timeLabel').textContent = '00:00';  // 与 GUI show_image → player.stop() 一致
  } else {
    // 修复 BUG-145: 切换视频前先停止旧视频，与 GUI player.setSource 一致
    if (oldPlayer && oldPlayer.parentNode) {
      oldPlayer.pause();
      oldPlayer.removeAttribute('src');  // 强制释放资源
      oldPlayer.load();
    }
    // 修复 BUG-146: 切换视频时重置控制面板，与 GUI player.setSource → positionChanged(0) 一致
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('seekSlider').value = 0;
    document.getElementById('seekSlider').max = 0;
    document.getElementById('timeLabel').textContent = '00:00';
    area.innerHTML = `<video id="videoPlayer" src="/api/media/${id}" preload="metadata" style="max-width:100%;max-height:100%;object-fit:contain;cursor:pointer" onerror="appendLog('❌ 文件不存在或已被删除');closePreview()" ondblclick="event.stopPropagation();toggleFullscreen()" title="双击全屏"></video>`;
    const player = document.getElementById('videoPlayer');
    // 修复 BUG-140: play() 错误不再静默吞掉，显示具体错误信息
    player.play().catch(err => {
      appendLog(`❌ 视频播放失败 [${v.title}]: ${err.message || err}`);
      closePreview();
    });
    setupPlayerEvents(player);
  }
  // 修复 v16: 图片预览也支持双击全屏（与 GUI show_image 后可全屏一致）
  if (imgExts.includes(ext)) {
    const img = area.querySelector('img');
    if (img) {
      img.style.cursor = 'pointer';
      img.ondblclick = (e) => { e.stopPropagation(); toggleFullscreen(); };
      img.title = '双击全屏';
    }
  }
  appendLog(`▶️ 播放: ${v.title}`);
}

// ======== Player Controls (与 MediaPreviewPanel 一致) ========
function setupPlayerEvents(player) {
  const slider = document.getElementById('seekSlider');
  const timeLabel = document.getElementById('timeLabel');
  let seeking = false;

  // 修复 BUG-142: 实时更新 slider 背景 gradient（填充效果），更丝滑
  const updateSliderFill = () => {
    if (slider.max > 0) {
      const pct = (slider.value / slider.max) * 100;
      slider.style.background = `linear-gradient(to right, var(--accent) 0%, var(--accent) ${pct}%, var(--input) ${pct}%, var(--input) 100%)`;
    } else {
      slider.style.background = 'var(--input)';
    }
  };

  player.ontimeupdate = () => {
    if (!seeking) {
      slider.value = player.currentTime;
      updateSliderFill();  // 实时更新填充
    }
    timeLabel.textContent = `${fmtTime(player.currentTime)} / ${fmtTime(player.duration || 0)}`;
  };
  player.ondurationchange = () => {
    slider.max = player.duration || 0;
    updateSliderFill();
  };

  // 修复 BUG-142: 使用更稳健的拖动处理
  // 与 GUI QSlider.sliderPressed / sliderReleased / setPosition 一致
  const onSeekStart = () => { seeking = true; };
  const onSeekEnd = () => {
    seeking = false;
    const newTime = parseFloat(slider.value);
    if (!isNaN(newTime)) {
      player.currentTime = newTime;
      updateSliderFill();
    }
  };
  slider.addEventListener('mousedown', onSeekStart);
  slider.addEventListener('touchstart', onSeekStart, { passive: true });
  slider.addEventListener('mouseup', onSeekEnd);
  slider.addEventListener('touchend', onSeekEnd);
  // input 事件: 拖动过程中实时更新 video 位置和填充色（更丝滑）
  slider.addEventListener('input', () => {
    if (seeking) {
      const newTime = parseFloat(slider.value);
      if (!isNaN(newTime)) {
        player.currentTime = newTime;
        updateSliderFill();  // 拖动时实时更新填充色
        timeLabel.textContent = `${fmtTime(newTime)} / ${fmtTime(player.duration || 0)}`;
      }
    } else {
      updateSliderFill();
    }
  });

  player.onplay = () => { document.getElementById('playBtn').textContent = '⏸'; };
  player.onpause = () => { document.getElementById('playBtn').textContent = '▶'; };
  // 与 GUI 一致：视频播放结束后，播放按钮恢复为播放图标
  player.onended = () => { document.getElementById('playBtn').textContent = '▶'; };
  // 修复 BUG-144: 视频元素加载开始时也重置播放按钮
  player.onloadstart = () => { document.getElementById('playBtn').textContent = '⏸'; };
}

function togglePlay() {
  const player = document.getElementById('videoPlayer');
  if (!player) return;
  // 修复 BUG-147: 视频未就绪时不响应（与 GUI QMediaPlayer 无 source 时的行为一致）
  if (!player.src || player.readyState < 1) {
    appendLog('⚠️ 视频还未就绪');
    return;
  }
  if (player.paused) {
    player.play().catch(err => {
      appendLog(`❌ 播放失败: ${err.message || err}`);
    });
  } else {
    player.pause();
  }
}

// ======== Fullscreen (与 GUI 一致: 隐藏顶栏、左面板、日志面板) ========
function toggleFullscreen() {
  if (!isFullscreenMode) {
    isFullscreenMode = true;
    document.body.classList.add('is-fullscreen');
    document.getElementById('fullscreenBtn').textContent = '[ 退出 ]';
  } else {
    isFullscreenMode = false;
    document.body.classList.remove('is-fullscreen');
    document.getElementById('fullscreenBtn').textContent = '[ 全屏 ]';
  }
}

// 修复 v16: ESC 退出全屏（与 GUI keyPressEvent → Escape → toggle_fullscreen_mode 一致）
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && isFullscreenMode) {
    e.preventDefault();
    toggleFullscreen();
    appendLog('🖥️ ESC 退出全屏');
  }
});

// #22: Double-click preview area toggles fullscreen
document.getElementById('previewArea').addEventListener('dblclick', () => {
  toggleFullscreen();
});

function fmtTime(s) {
  if (!s || isNaN(s)) return '00:00';
  const sec = Math.floor(s) % 60;
  const min = Math.floor(s) / 60;
  return `${String(Math.floor(min)).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// ======== Log (与 LogPanel 一致) ========
const pendingLogs = [];
let logFlushScheduled = false;

function flushLogs() {
  logFlushScheduled = false;
  const el = document.getElementById('logPanel');
  if (!el || pendingLogs.length === 0) return;
  const fragment = document.createDocumentFragment();
  for (const msg of pendingLogs.splice(0)) {
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.textContent = String(msg);
    fragment.appendChild(entry);
  }
  el.appendChild(fragment);
  el.scrollTop = el.scrollHeight;
  while (el.children.length > 500) el.removeChild(el.firstChild);
}

function appendLog(msg) {
  pendingLogs.push(msg);
  if (logFlushScheduled) return;
  logFlushScheduled = true;
  requestAnimationFrame(flushLogs);
}

// ======== Selection Dialog (与 SelectionDialog 一致) ========
function showSelectionModal(items) {
  appendLog(`📋 弹窗: 共扫描到 ${items.length} 个资源，请选择下载项目`);
  document.getElementById('selectionHeader').textContent = `共扫描到 ${items.length} 个资源，请勾选需要下载的项目：`;
  const body = document.getElementById('selectionBody');
  body.innerHTML = items.map((item, i) =>
    `<tr><td style="text-align:center;padding:5px;border-bottom:1px solid var(--border);"><input type="checkbox" id="sel_${i}" data-index="${i}" checked /></td>
     <td style="padding:5px;border-bottom:1px solid var(--border);">${esc(item.title || '未知标题')}</td></tr>`
  ).join('');
  // 修复 BUG-181: ensureModalStyle 已删除，直接用 inline style 显示 modal
  const modal = document.getElementById('selectionModal');
  modal.style.display = 'flex';
}

function selectAll() {
  document.querySelectorAll('#selectionBody input[type="checkbox"]').forEach(cb => cb.checked = true);
}
function selectInvert() {
  document.querySelectorAll('#selectionBody input[type="checkbox"]').forEach(cb => cb.checked = !cb.checked);
}
function confirmSelection() {
  const indices = [];
  document.querySelectorAll('#selectionBody input[type="checkbox"]:checked').forEach(cb => {
    indices.push(parseInt(cb.dataset.index));
  });
  appendLog(`✅ 用户确认了 ${indices.length} 个任务`);
  sendWS('select_tasks', { indices });
  // 修复 BUG-156: 直接用 inline style 操作
  document.getElementById('selectionModal').style.display = 'none';
}
// Cancel sends null (matching GUI behavior: show_selection_dialog returns None on reject)
function cancelSelection() {
  appendLog('❌ 用户取消了任务');
  sendWS('select_tasks', { indices: null });
  // 修复 BUG-156: 直接用 inline style 操作
  document.getElementById('selectionModal').style.display = 'none';
}

// ======== Theme (与 themes.py 一致) ========
function toggleTheme() {
  isDarkTheme = !isDarkTheme;
  document.documentElement.setAttribute('data-theme', isDarkTheme ? '' : 'light');
  document.getElementById('themeBtn').textContent = isDarkTheme ? '🌙' : '☀️';
  appendLog(`🎨 已切换到${isDarkTheme ? '深色' : '浅色'}主题`);
  // 修复闪烁 BUG: 同步写入 localStorage，让刷新后直接渲染正确主题
  try { localStorage.setItem('cached_dark_theme', isDarkTheme ? 'true' : 'false'); } catch(e) {}
  // #26: Theme toggle saves to config via WebSocket
  sendWS('change_theme', { dark_theme: isDarkTheme });
}

// ======== 修复闪烁 BUG: localStorage 缓存同步与主体解锁 ========
// _unlockBody: 收到首次 config 消息后移除 body.loading 类，显示主体
function _unlockBody() {
  // 双重检查: 确认 platforms 和 config 都已收到
  if (!platforms || platforms.length === 0) return;
  document.body.classList.remove('loading');
}

// _syncLocalCache: 把当前 UI 状态同步到 localStorage，下次刷新直接用
function _syncLocalCache() {
  try {
    localStorage.setItem('cached_dark_theme', isDarkTheme ? 'true' : 'false');
    if (currentSource) localStorage.setItem('cached_last_source', currentSource);
    if (currentSaveDir) localStorage.setItem('cached_save_dir', currentSaveDir);
  } catch(e) {}
}

// _cacheSource / _cacheDir: 用户切换源/目录时立即写入缓存（不依赖 WebSocket 消息）
function _cacheSource(src) {
  try { if (src) localStorage.setItem('cached_last_source', src); } catch(e) {}
}
function _cacheDir(dir) {
  try { if (dir) localStorage.setItem('cached_save_dir', dir); } catch(e) {}
}

// ======== Keyboard ========
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.activeElement === document.getElementById('searchInput')) startCrawl();
  if (e.key === 'Enter' && document.activeElement === document.getElementById('dirInput')) dirBrowsePath();
  if (e.key === 'Escape') {
    const dirModal = document.getElementById('dirModal');
    // 修复 BUG-156: 检查 inline style
    if (dirModal.style.display === 'flex') { cancelDirDialog(); return; }
    const selModal = document.getElementById('selectionModal');
    if (selModal.style.display === 'flex') { cancelSelection(); return; }
  }
  // 与 GUI QTableWidget 一致：上下箭头键选择表格行
  if ((e.key === 'ArrowUp' || e.key === 'ArrowDown') && videoOrder.length > 0) {
    // 不在输入框中时才响应
    const tag = document.activeElement && document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
    e.preventDefault();
    const curIdx = selectedVideoId ? videoOrder.indexOf(selectedVideoId) : -1;
    let newIdx;
    if (e.key === 'ArrowDown') {
      newIdx = curIdx < videoOrder.length - 1 ? curIdx + 1 : 0;
    } else {
      newIdx = curIdx > 0 ? curIdx - 1 : videoOrder.length - 1;
    }
    selectVideo(videoOrder[newIdx]);
    // 滚动到选中行
    const row = document.querySelector(`tr[data-vid="${videoOrder[newIdx]}"]`);
    if (row) row.scrollIntoView({ block: 'nearest' });
  }
  // 与 GUI 一致：Delete 键删除选中行
  if (e.key === 'Delete' && selectedVideoId && document.activeElement === document.body) {
    deleteVideo(selectedVideoId);
  }
});

// ======== Init ========
connectWS();

// 修复闪烁 BUG: 超时保护 (3 秒后如果仍未解锁，强制解锁)
setTimeout(function() {
  if (!_initReady) {
    _initReady = true;
    _unlockBody();
    console.warn('[init] config 消息超时，强制解锁主体');
  }
}, 3000);
</script>
